openapi: 3.0.0
info:
  title: Blog API - INF222 EC1 TAF1
  description: API Backend pour la gestion d'un blog simple
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Serveur local

tags:
  - name: Articles
    description: Gestion des articles du blog

paths:
  /api/articles:
    get:
      tags: [Articles]
      summary: Récupérer tous les articles
      parameters:
        - in: query
          name: categorie
          schema: { type: string }
          description: Filtrer par catégorie
        - in: query
          name: auteur
          schema: { type: string }
          description: Filtrer par auteur
        - in: query
          name: date
          schema: { type: string, format: date }
          description: Filtrer par date (YYYY-MM-DD)
      responses:
        '200':
          description: Liste des articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  count:   { type: integer }
                  articles:
                    type: array
                    items: { $ref: '#/components/schemas/Article' }

    post:
      tags: [Articles]
      summary: Créer un nouvel article
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArticleInput' }
      responses:
        '201':
          description: Article créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  article: { $ref: '#/components/schemas/Article' }
        '400':
          description: Données invalides

  /api/articles/search:
    get:
      tags: [Articles]
      summary: Rechercher des articles par titre ou contenu
      parameters:
        - in: query
          name: query
          required: true
          schema: { type: string }
          description: Texte à rechercher
      responses:
        '200':
          description: Articles correspondant à la recherche
        '400':
          description: Paramètre query manquant

  /api/articles/{id}:
    get:
      tags: [Articles]
      summary: Récupérer un article par ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Article trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  article: { $ref: '#/components/schemas/Article' }
        '404':
          description: Article non trouvé

    put:
      tags: [Articles]
      summary: Modifier un article existant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titre:     { type: string }
                contenu:   { type: string }
                categorie: { type: string }
                tags:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Article mis à jour
        '400':
          description: Aucun champ à modifier
        '404':
          description: Article non trouvé

    delete:
      tags: [Articles]
      summary: Supprimer un article
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Article supprimé
        '404':
          description: Article non trouvé

components:
  schemas:
    Article:
      type: object
      properties:
        id:        { type: integer,  example: 1 }
        titre:     { type: string,   example: "Introduction au Web" }
        contenu:   { type: string,   example: "Le web est..." }
        auteur:    { type: string,   example: "Alice" }
        date:      { type: string,   example: "2026-03-23" }
        categorie: { type: string,   example: "Technologie" }
        tags:
          type: array
          items: { type: string }
          example: ["html", "css"]

    ArticleInput:
      type: object
      required: [titre, contenu, auteur, categorie]
      properties:
        titre:     { type: string }
        contenu:   { type: string }
        auteur:    { type: string }
        date:      { type: string, format: date }
        categorie: { type: string }
        tags:
          type: array
          items: { type: string }
